name: release

on:
  release:
    types: [created]

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          ASSET="devswitch-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -ldflags "-X github.com/goropikari/devswitch/internal/devswitch.Version=${TAG}" -o "$ASSET" ./cmd/devswitch
          echo "ASSET=$ASSET" >> "$GITHUB_ENV"

      - name: Upload release asset
        uses: softprops/action-gh-release@b25b93d384199fc0fc8c2e126b2d937a0cbeb2ae # v2.5.2
        with:
          files: ${{ env.ASSET }}
